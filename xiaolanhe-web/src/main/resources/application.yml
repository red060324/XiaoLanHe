spring:
  application:
    name: xiaolanhe
  profiles:
    active: dev

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

xiaolanhe:
  agent:
    mode: single-orchestrator
  messaging:
    topics:
      chat-audit: xiaolanhe_chat_audit
  search:
    enabled: false
    cache-ttl: 10m
